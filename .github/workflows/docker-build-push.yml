name: Build and Push Frontend Image

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Optional release version tag, for example v0.1.1"
        required: false
        type: string

concurrency:
  group: docker-build-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_NAME: front-end
  APP_DIR: .

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Prepare image metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${IMAGE_NAME}:sha-${SHORT_SHA}"
            if [ -n "${{ inputs.version }}" ]; then
              echo "${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${IMAGE_NAME}:${{ inputs.version }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          file: ${{ env.APP_DIR }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Check infra repository access
        env:
          INFRA_REPO_TOKEN: ${{ secrets.INFRA_REPO_TOKEN }}
        run: |
          status=$(curl -sS -o /tmp/infra-repo-response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${INFRA_REPO_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Charming-Team/infra)

          if [ "$status" != "200" ]; then
            cat /tmp/infra-repo-response.json
            echo "::error::INFRA_REPO_TOKEN cannot access Charming-Team/infra. Check repository selection, organization approval, and SSO authorization. HTTP status: ${status}"
            exit 1
          fi

      - name: Checkout infra repository
        uses: actions/checkout@v4
        with:
          repository: Charming-Team/infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          ref: main
          path: infra

      - name: Update frontend image digest
        env:
          IMAGE_REF: ${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}
        run: |
          sed -i "s|image: .*skala26a-ai3/front-end.*|image: ${IMAGE_REF}|" infra/k8s/frontend/deployment.yaml
          grep "image:" infra/k8s/frontend/deployment.yaml

      - name: Create infra manifest update PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra
          branch: chore/update-frontend-image-${{ steps.meta.outputs.tag }}
          base: main
          title: "chore: update frontend image to ${{ steps.meta.outputs.tag }}"
          commit-message: "chore: update frontend image to ${{ steps.meta.outputs.tag }}"
          body: |
            Updates the frontend deployment image after a successful frontend image build.

            - Image: `${{ steps.meta.outputs.image }}`
            - Tag: `${{ steps.meta.outputs.tag }}`
            - Digest: `${{ steps.build.outputs.digest }}`
